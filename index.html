<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTERIA CAPITAL ROLEPLAY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a0f0d;
            --card-bg: #121a16;
            --text-color: #ffffff;
            --primary: #00e676; /* Verde Loteria */
            --primary-dark: #00c853;
            --secondary: #ffffff; /* Branco */
            --border-color: #1b2e24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* TELA DE LOADING (5 SEGUNDOS) */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-title {
            font-size: 2.3rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            text-transform: uppercase;
        }

        .progress-container {
            width: 80%;
            max-width: 400px;
            height: 8px;
            background-color: #112219;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary);
            animation: load 5s linear forwards;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* TELA DE AUTH (VERDE E BRANCO) */
        #auth-screen {
            display: none;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at center, #11251a 0%, var(--bg-color) 100%);
        }

        .auth-container {
            background-color: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.15);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #617d6f;
            transition: 0.3s;
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #4b6e5c;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background-color: #080d0b;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--primary-dark), var(--primary));
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            opacity: 0.95;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }

        /* SITE PRINCIPAL */
        #main-screen {
            display: none;
            padding-top: 90px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background-color: #060a08;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 900;
        }

        .logo-area {
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--secondary);
            letter-spacing: 1px;
        }
        .logo-area span { color: var(--primary); }

        /* ÍCONE DE CONFIGURAÇÃO ESCONDIDO PARA ADMINS */
        .admin-trigger-icon {
            color: #243d30;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            padding: 10px;
        }
        .admin-trigger-icon:hover {
            color: var(--primary);
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--secondary);
            margin: 40px 0 20px 0;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        .section-title i { color: var(--primary); }

        /* BANNER DO PRÊMIO POSTADO */
        .prize-banner {
            background: linear-gradient(135deg, #112218, #070d0a);
            border: 2px solid var(--border-color);
            border-left: 6px solid var(--primary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .prize-tag {
            background-color: var(--primary);
            color: #000;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 12px;
        }

        .prize-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
        }

        .prize-desc {
            color: #a3b8ad;
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .prize-meta-box {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            background-color: #09120e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #16261d;
        }

        .meta-item {
            flex: 1;
            min-width: 140px;
        }

        .meta-label {
            font-size: 0.75rem;
            color: #587c67;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
        }
        .meta-value.highlight { color: var(--primary); }

        .buy-actions {
            display: flex;
            gap: 10px;
        }

        .btn-buy-zap {
            flex: 1;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-buy-discord {
            flex: 1;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-buy-zap:hover, .btn-buy-discord:hover { opacity: 0.9; transform: translateY(-2px); }

        /* MODAIS */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #4b6e5c;
        }
        .close-modal:hover { color: white; }

        .status-msg {
            margin-top: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
        }

        .no-prizes {
            text-align: center;
            color: #4b6e5c;
            padding: 40px;
            border: 2px dashed #16261d;
            border-radius: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-title">LOTERIA CAPITAL RP</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <div id="auth-screen">
        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">LOGIN</div>
                <div class="auth-tab" id="tab-register">REGISTRO</div>
            </div>
            
            <h2 id="auth-title" style="text-align: center; margin-bottom: 20px; font-size: 1.1rem; letter-spacing: 0.5px;">ACESSAR BILHETES</h2>
            
            <form id="auth-form">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="auth-username" placeholder="Nome de usuário no RP" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="auth-password" placeholder="Sua Senha" required>
                </div>
                <button type="submit" class="btn" id="auth-submit-btn">Entrar</button>
            </form>
            <div id="auth-msg" class="status-msg"></div>
        </div>
    </div>

    <div id="main-screen">
        <header>
            <div class="logo-area">LOTERIA <span>CAPITAL RP</span></div>
            <div class="admin-trigger-icon" id="hidden-admin-trigger">
                <i class="fa-solid fa-gear"></i>
            </div>
        </header>

        <div class="container">
            <div class="section-title">
                <i class="fa-solid fa-ticket"></i> Prêmios Disponíveis
            </div>

            <div id="prizes-container">
                <div class="no-prizes">Buscando sorteios ativos na nuvem...</div>
            </div>
        </div>
    </div>

    <div id="admin-auth-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-admin-auth">&times;</span>
            <h2 style="margin-bottom: 15px; font-size: 1.3rem;"><i class="fa-solid fa-shield-halved" style="color:var(--primary)"></i> Autenticação Restrita</h2>
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="admin-secret-key" placeholder="Digite o código de verificação">
            </div>
            <button class="btn" id="btn-submit-admin-key">Validar Chave</button>
            <div id="admin-auth-msg" class="status-msg"></div>
        </div>
    </div>

    <div id="admin-dashboard-modal" class="modal">
        <div class="modal-content" style="max-width: 550px;">
            <span class="close-modal" id="close-admin-dashboard">&times;</span>
            <h2 style="color: var(--primary); margin-bottom: 20px; font-size: 1.4rem;"><i class="fa-solid fa-crown"></i> Gerenciar Sorteios</h2>
            
            <form id="admin-post-form">
                <div class="input-group">
                    <i class="fa-solid fa-heading"></i>
                    <input type="text" id="post-title" placeholder="Título do Prêmio (Ex: Fusca Turbinado)" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-align-left"></i>
                    <input type="text" id="post-desc" placeholder="Descrição completa do sorteio" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-money-bill-wave"></i>
                    <input type="text" id="post-reward" placeholder="Valor do Prêmio em Dinheiro/Fichas" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-tag"></i>
                    <input type="text" id="post-ticket-price" placeholder="Preço de cada Bilhete" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-clover"></i>
                    <input type="number" id="post-lucky-number" min="1" max="1000" placeholder="Número premiado secreto (1 a 1000)" required>
                </div>
                <button type="submit" class="btn">Publicar Novo Sorteio</button>
            </form>
            <div id="admin-post-msg" class="status-msg"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Suas Credenciais Oficiais
        const firebaseConfig = {
            apiKey: "AIzaSyB17R9AgUkclGSw7nnLDfO7Yio8Di9P5T0",
            authDomain: "capital-rp-aa7c6.firebaseapp.com",
            projectId: "capital-rp-aa7c6",
            databaseURL: "https://capital-rp-aa7c6-default-rtdb.firebaseio.com",
            storageBucket: "capital-rp-aa7c6.firebasestorage.app",
            messagingSenderId: "605631037077",
            appId: "1:605631037077:web:54e868801450b9ed6d259c",
            measurementId: "G-XYZK98QXLG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentAuthMode = 'login';
        let currentUser = null;
        let isUserAdmin = false;

        // Gerenciamento Tela de Carregamento
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    checkSession();
                }, 500);
            }, 5000);
        });

        // Abas Autenticação
        document.getElementById('tab-login').addEventListener('click', () => switchAuthTab('login'));
        document.getElementById('tab-register').addEventListener('click', () => switchAuthTab('register'));

        function switchAuthTab(mode) {
            currentAuthMode = mode;
            document.getElementById('auth-msg').innerText = '';
            if(mode === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-register').classList.remove('active');
                document.getElementById('auth-title').innerText = 'ACESSAR BILHETES';
                document.getElementById('auth-submit-btn').innerText = 'Entrar';
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('auth-title').innerText = 'REGISTRAR NOVA CONTA';
                document.getElementById('auth-submit-btn').innerText = 'Criar Conta';
            }
        }

        // Login e Criação de Contas Unificadas
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('auth-username').value.trim();
            const pass = document.getElementById('auth-password').value;
            const msg = document.getElementById('auth-msg');

            if(!user || !pass) return;
            const cleanUser = user.toLowerCase().replace(/[^a-z0-9]/g, "");

            const userRef = ref(db, 'users/' + cleanUser);
            get(userRef).then((snapshot) => {
                const userData = snapshot.val();

                if(currentAuthMode === 'register') {
                    if(userData) {
                        msg.style.color = '#ff5252';
                        msg.innerText = 'Este usuário já está cadastrado!';
                        return;
                    }
                    set(userRef, {
                        username: user,
                        password: pass,
                        chips: 50,
                        isAdmin: false,
                        lastDaily: new Date().getTime()
                    }).then(() => {
                        msg.style.color = 'var(--primary)';
                        msg.innerText = 'Cadastro efetuado! Faça o login.';
                        switchAuthTab('login');
                    });
                } else {
                    if(!userData || userData.password !== pass) {
                        msg.style.color = '#ff5252';
                        msg.innerText = 'Usuário ou senha inválidos!';
                        return;
                    }
                    currentUser = cleanUser;
                    localStorage.setItem('capital_rp_session_id', cleanUser);
                    enterMainDashboard();
                }
            });
        });

        function checkSession() {
            const sessionID = localStorage.getItem('capital_rp_session_id');
            if(sessionID) {
                get(ref(db, 'users/' + sessionID)).then((snapshot) => {
                    if(snapshot.exists()) {
                        currentUser = sessionID;
                        enterMainDashboard();
                    } else {
                        document.getElementById('auth-screen').style.display = 'flex';
                    }
                });
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        }

        function enterMainDashboard() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';

            // Observa permissões de administrador
            onValue(ref(db, 'users/' + currentUser), (snapshot) => {
                const data = snapshot.val();
                if(data && data.isAdmin) {
                    isUserAdmin = true;
                }
            });

            startPrizesListener();
        }

        // MONTA OS PRÊMIOS DA LOTERIA EM TEMPO REAL
        function startPrizesListener() {
            onValue(ref(db, 'lottery_draws'), (snapshot) => {
                const container = document.getElementById('prizes-container');
                container.innerHTML = '';

                if(!snapshot.exists()) {
                    container.innerHTML = '<div class="no-prizes">Nenhum sorteio correndo no momento. Aguarde o ADM lançar!</div>';
                    return;
                }

                snapshot.forEach((childSnapshot) => {
                    const prize = childSnapshot.val();
                    
                    // Condicional: Apenas mostra o número da sorte se a conta logada for administrador reconhecido
                    let secretBlock = '';
                    if(isUserAdmin) {
                        secretBlock = `
                            <div class="meta-item" style="border-left: 2px solid #ff5252; padding-left: 10px;">
                                <div class="meta-label" style="color: #ff5252;"><i class="fa-solid fa-eye"></i> Segredo ADM</div>
                                <div class="meta-value" style="color: #ff5252;">Nº ${prize.luckyNumber}</div>
                            </div>
                        `;
                    }

                    container.innerHTML += `
                        <div class="prize-banner">
                            <div class="prize-tag"><i class="fa-solid fa-fire"></i> Sorteio Ativo</div>
                            <div class="prize-title">${prize.title}</div>
                            <div class="prize-desc">${prize.desc}</div>
                            
                            <div class="prize-meta-box">
                                <div class="meta-item">
                                    <div class="meta-label">Premiação Acumulada</div>
                                    <div class="meta-value highlight">${prize.reward}</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Custo do Bilhete</div>
                                    <div class="meta-value">${prize.price}</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Disponibilidade</div>
                                    <div class="meta-value">1 a 1000</div>
                                </div>
                                ${secretBlock}
                            </div>

                            <div class="buy-actions">
                                <a href="https://wa.me/554991467726" target="_blank" class="btn-buy-zap">
                                    <i class="fa-brands fa-whatsapp"></i> Comprar via WhatsApp
                                </a>
                                <a href="https://discord.gg/zFtBV3Dts" target="_blank" class="btn-buy-discord">
                                    <i class="fa-brands fa-discord"></i> Chamar no Discord
                                </a>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // Gatilho Escondido do Painel Administrativo (Engrenagem no Header)
        document.getElementById('hidden-admin-trigger').addEventListener('click', () => {
            if(isUserAdmin) {
                // Se já validou antes, abre o painel direto
                openModal('admin-dashboard-modal');
            } else {
                // Se não, abre caixa para digitar o código secreto
                openModal('admin-auth-modal');
            }
        });

        // Validação da Chave 2012
        document.getElementById('btn-submit-admin-key').addEventListener('click', () => {
            const key = document.getElementById('admin-secret-key').value;
            const msg = document.getElementById('admin-auth-msg');

            if(key === '2012') {
                update(ref(db, 'users/' + currentUser), { isAdmin: true }).then(() => {
                    isUserAdmin = true;
                    closeModal('admin-auth-modal');
                    openModal('admin-dashboard-modal');
                    document.getElementById('admin-secret-key').value = '';
                    msg.innerText = '';
                });
            } else {
                msg.style.color = '#ff5252';
                msg.innerText = 'Código de acesso incorreto!';
            }
        });

        // Envio de Novas Postagens pelo Administrador
        document.getElementById('admin-post-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('post-title').value.trim();
            const desc = document.getElementById('post-desc').value.trim();
            const reward = document.getElementById('post-reward').value.trim();
            const price = document.getElementById('post-ticket-price').value.trim();
            const luckyNumber = parseInt(document.getElementById('post-lucky-number').value);
            const msg = document.getElementById('admin-post-msg');

            if(luckyNumber < 1 || luckyNumber > 1000) {
                msg.style.color = '#ff5252';
                msg.innerText = 'O número premiado deve ser obrigatoriamente entre 1 e 1000!';
                return;
            }

            const newDrawRef = push(ref(db, 'lottery_draws'));
            set(newDrawRef, {
                title: title,
                desc: desc,
                reward: reward,
                price: price,
                luckyNumber: luckyNumber
            }).then(() => {
                msg.style.color = 'var(--primary)';
                msg.innerText = 'Sorteio publicado com absoluto sucesso!';
                document.getElementById('admin-post-form').reset();
                setTimeout(() => { closeModal('admin-dashboard-modal'); msg.innerText = ''; }, 1500);
            });
        });

        // Funções Base Modais
        document.getElementById('close-admin-auth').addEventListener('click', () => closeModal('admin-auth-modal'));
        document.getElementById('close-admin-dashboard').addEventListener('click', () => closeModal('admin-dashboard-modal'));

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
